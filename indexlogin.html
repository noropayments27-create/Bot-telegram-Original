<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Bot - Noropayments.shop</title>
    <!-- Iconos de FontAwesome para el icono de usuario -->
    <link rel="stylesheet" href="cdnjs.cloudflare.com">
    <style>
        /* Colores Principales */
        :root {
            --primary-bg: #1a1a1a;
            --secondary-bg: #2c2c2c;
            --scarlet-red: #ff2400;
            --text-color: #ff2400;
            --shadow-dark: rgba(0, 0, 0, 0.7);
            --shadow-light: rgba(70, 70, 70, 0.3);
        }

        /* Cursor Personalizado (Espacial Rojo) */
        /* Usamos un cursor por defecto si la URL falla, y añadimos un 'glow' con box-shadow al body */
        body {
            background-color: var(--primary-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 10;
            font-family: Arial, sans-serif;
            color: var(--text-color);
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="www.w3.org" width="24" height="24" viewBox="0 0 24 24" fill="%23ff2400"><circle cx="12" cy="12" r="10" stroke="%23ff2400" stroke-width="2" fill="none""")/>></svg>') 12 12, auto;
            transition: all 0.5s ease; /* Para la animación de login */
        }

        /* Animación "brutal" (se activa con JS en el body) */
        body.login-success {
            transform: scale(2);
            opacity: 0;
            background-color: #000000;
            box-shadow: inset 0 0 500px #fff;
        }

        .title-container {
            text-align: center;
            margin-bottom: 10px;
            color: #fff;
            position: absolute;
            top: calc(40% - 250px); /* Posicionar arriba del login-container */
            left: 50%;
            transform: translateX(-50%);
        }

        .title-container h1 {
            font-size: 30px;
            margin: 0;
        }
        
        .title-container p {
            font-size: 38px;
            margin: 0;
        }

        .login-container {
            background-color: var(--secondary-bg);
            padding: 100px 40px 40px;
            border-radius: 40px;
            box-shadow: 
                10px 10px 30px var(--shadow-dark),
                -10px -10px 30px var(--shadow-light);
            position: relative;
            text-align: center;
            width: 300px;
            border: 2px solid var(--scarlet-red);
        }

        .user-icon-bg {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 100px;
            background-color: var(--secondary-bg);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 
                5px 5px 15px var(--shadow-dark),
                -5px -5px 15px var(--shadow-light);
            border: 2px solid var(--scarlet-red);
            overflow: hidden;
        }
        
        .user-icon-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .login-form input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: none;
            background-color: var(--secondary-bg);
            border-radius: 10px;
            box-shadow: inset 5px 5px 10px var(--shadow-dark),
                        inset -5px -5px 10px var(--shadow-light);
            color: var(--text-color);
            outline: none;
            box-sizing: border-box;
            text-transform: uppercase;
        }

        .login-form input::placeholder {
            color: var(--text-color);
            opacity: 0.7;
        }

        .remember-me {
            display: flex;
            align-items: center;
            justify-content: start;
            font-size: 16px;
            margin-bottom: px;

        }

        /* Aseguramos que solo el input sea interactuable */
        .remember-me input[type="checkbox"] {
            margin-right: 10px;
            appearance: none;
            width: 16px;
            height: 16px;
            background-color: var(--secondary-bg);
            border-radius: 3px;
            box-shadow: inset 2px 2px 4px var(--shadow-dark),
                        inset -2px -2px 4px var(--shadow-light);
            cursor: pointer;
            /* Transición para el color al marcar */
            transition: background-color 0.3s ease, box-shadow 0.3s ease; 
        }

        /* Cambiamos el fondo del checkbox a rojo cuando está marcado */
        .remember-me input[type="checkbox"]:checked {
            background-color: var(--scarlet-red);
            box-shadow: inset 2px 2px 4px rgba(255, 255, 255, 0.5),
                        inset -2px -2px 4px rgba(0, 0, 0, 0.2);
        }

        .remember-me input[type="checkbox"]:checked::after {
            display: block;
            color: var(--primary-bg); /* Color oscuro para el checkmark */
            font-size: 12px;
            line-height: 16px;
            text-align: center;
        }

        .login-form button {
            font-size: 25px;
            width: 120px;
            height: 120px;
            background-color: var(--secondary-bg);
            border: 2px solid var(--scarlet-red);
            border-radius: 50%;
            color: var(--text-color);
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 
                8px 8px 16px var(--shadow-dark),
                -8px -8px 16px var(--shadow-light);
            cursor: pointer;
            transition: all 0.3s ease;
            position: absolute;
            bottom: -60px;
            right: 30px;
        }

        .login-form button:hover {
            box-shadow: 
                4px 4px 8px var(--shadow-dark),
                -4px -4px 8px var(--shadow-light);
        }
    </style>
</head>
<body>

    <div class="title-container">
        <h1>Admin Bot</h1>
        <p>Noropayments.shop</p>
    </div>

    <div class="login-container">
        <div class="user-icon-bg">
            <img src="https://i.ibb.co/356LrnLr/bot.png" alt="User Icon">
        </div>
        <form class="login-form" id="loginForm">
            <input type="text" id="username" placeholder="USUARIO" required>
            <input type="password" id="password" placeholder="CONTRASEÑA" required>
            <label class="remember-me">
                <input type="checkbox" id="rememberMeCheckbox">
                Recuerdame
            </label>
            <button type="submit">Inicio</button>
        </form>
    </div>

    <script>
        // Implementación de JavaScript
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Previene el envío tradicional del formulario

            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            // const rememberMe = document.getElementById('rememberMeCheckbox').checked; // No se usa para la lógica de login, pero se puede usar para guardar credenciales localmente si se expande

            // Credenciales requeridas, convertimos a minúsculas para hacerlas case-insensitive
            const validUsername = 'noropayments';
            const validPassword = 'noro123';

            if (usernameInput.toLowerCase() === validUsername && passwordInput.toLowerCase() === validPassword) {
                // Login exitoso
                alert('¡Login Exitoso! ¡Bienvenido, Admin Bot!');
                
                // Animación "brutal"
                document.body.classList.add('login-success');
                
                // Redirigir o realizar otra acción después de la animación (ej: 1 segundo)
                setTimeout(() => {
                    // window.location.href = 'dashboard.html'; // Descomentar para redirigir
                    console.log('Redirigiendo a Dashboard...');
                }, 1000); 

            } else {
                // Login fallido
                alert('Error de credenciales. Inténtalo de nuevo.');
            }
        });

        // Asegurar que el checkbox solo se marque al hacer clic en el input, no en el label entero.
        // El CSS ya maneja el estilo del input al estar 'checked'.
    </script>

</body>
</html>
